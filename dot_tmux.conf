# Set terminal to xterm
set -g default-terminal "xterm"
set-option -ga terminal-overrides ",xterm:Tc"

# Scrollback history
set -g history-limit 10000

# Escape key timing
set -sg escape-time 1

# Start window and pane index at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Status bar colors (Mint & Lavender)
set -g status-bg colour121   # Mint green
set -g status-fg colour183   # Lavender

# Active window styling
set -g window-status-current-style bg=colour183,fg=colour0

# Inactive window styling
set -g window-status-style bg=colour121,fg=colour234

# Pane borders
set -g pane-border-style fg=colour250
set -g pane-active-border-style fg=colour183

# Message styling
set -g message-style bg=colour183,fg=colour0

# Status bar layout
set -g status-left '#[fg=colour0,bg=colour121] #S #[default]'
set -g status-right '#[fg=colour0,bg=colour121] %Y-%m-%d %H:%M #[default]'

# Vim-style copy mode
setw -g mode-keys vi

# Enable mouse support
set -g mouse on
