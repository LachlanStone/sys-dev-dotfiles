## tmux: modern defaults for truecolor, performance and Catppuccin Mocha readability

# Prefer a tmux 256color terminal if available
set -g default-terminal "tmux-256color"
# Enable truecolor support where possible
set -as terminal-overrides ",xterm-256color:Tc,screen-256color:Tc"

# Scrollback history (larger so you can search long sessions)
set -g history-limit 50000

# Escape key timing (lower can break some terminals; 10ms is a good default)
set -sg escape-time 10

# Start window and pane index at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Status bar colors (Catppuccin Mocha: background and foreground)
set -g status-bg '#1e1e2e'
set -g status-fg '#cdd6f4'
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'

# Active window styling
set -g window-status-current-style 'bg=#89b4fa,fg=#1e1e2e'

# Inactive window styling
set -g window-status-style 'bg=#11121b,fg=#bac2de'

# Pane borders (subtle)
set -g pane-border-style 'fg=#585b70'
set -g pane-active-border-style 'fg=#89b4fa'

# Message styling (popup messages)
set -g message-style 'bg=#89b4fa,fg=#1e1e2e'

# Status bar layout (compact)
set -g status-left '#[fg=#1e1e2e,bg=#89b4fa] #S #[default]'
set -g status-right '#[fg=#1e1e2e,bg=#11121b] %Y-%m-%d %H:%M #[default]'

# Vim-style copy mode
setw -g mode-keys vi

# Enable mouse support for easy pane/resizing/selection
set -g mouse on

# Faster pane switching with Alt-arrow (works in most terminals)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Allow UTF-8 and better clipboard handling if available
set -g utf8 on
set -g set-clipboard on
